name: CI

on:
  push:
    branches:
      - main
      - version-16
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          pip install flit
          pip install -e .

      - name: Run basic import test
        run: |
          python -c "import zikpro_invoice_ocr"

  semgrep:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Semgrep
        uses: returntocorp/semgrep-action@v1
        with:
          config: https://raw.githubusercontent.com/frappe/semgrep-rules/main/semgrep.yml
